<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Navigation Projets</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <link rel="stylesheet" href="navigation.css" />
</head>
<body>

  <div class="header">
    <img src="assets/banner-avatar.png" alt="" style="width:80px;height:80px;border-radius:50%;flex-shrink:0;" />
    <div>
      <div class="header-title">Navigation Projets</div>
      <div class="header-subtitle">Naviguer entre les onglets</div>
    </div>
  </div>

  <div class="section">
    <div class="filters">
      <button class="filter-btn active" data-filter="all">Tous</button>
      <button class="filter-btn filter-fact" data-filter="Facturable">Facturables</button>
      <button class="filter-btn filter-int" data-filter="Non-facturable">Internes</button>
      <button class="filter-btn filter-cons" data-filter="Consultant municipal">Consultants</button>
    </div>

    <div class="nav-options">
      <label><input type="checkbox" id="chkTemplates" /> Afficher les templates</label>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Rechercher un projet..." />
    </div>

    <div class="project-count" id="projectCount"></div>

    <div class="project-list" id="projectList">
      <div class="loading">Chargement...</div>
    </div>

    <button class="btn-refresh" id="btnRefresh">🔄 Actualiser la liste</button>
  </div>

  <div class="section special-nav">
    <div class="section-title">Onglets spéciaux</div>
    <button class="nav-btn special" data-sheet="Ressources">📊 Ressources</button>
    <button class="nav-btn special" data-sheet="Planification LT équipe">📅 Planification LT équipe</button>
    <button class="nav-btn special" data-sheet="Tableau de bord">📈 Tableau de bord</button>
  </div>

  <div class="footer">
    Navigation — Planification Nutcache v34
  </div>

  <script>
    let allSheets = [];
    let navFilter = "all";

    Office.onReady(function(info) {
      if (info.host === Office.HostType.Excel) {
        init();
      }
    });

    function init() {
      // Boutons navigation spéciale
      document.querySelectorAll('.nav-btn.special').forEach(btn => {
        btn.addEventListener('click', () => navigateToSheet(btn.dataset.sheet));
      });

      // Recherche
      document.getElementById('searchInput').addEventListener('input', renderList);

      // Filtres catégorie
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          navFilter = btn.dataset.filter;
          renderList();
        });
      });

      // Templates checkbox
      document.getElementById('chkTemplates').addEventListener('change', renderList);

      // Bouton actualiser
      document.getElementById('btnRefresh').addEventListener('click', loadSheets);

      loadSheets();
    }

    async function loadSheets() {
      try {
        await Excel.run(async (context) => {
          const sheets = context.workbook.worksheets;
          sheets.load("items/name,items/tabColor,items/visibility");
          
          // Lire le Tableau de bord pour les noms de projets
          const dbSheet = context.workbook.worksheets.getItemOrNullObject("Tableau de bord");
          await context.sync();

          // Construire un dictionnaire code → nom depuis le Dashboard
          const projectNames = {};
          if (!dbSheet.isNullObject) {
            const dbRange = dbSheet.getRangeByIndexes(0, 0, 200, 3);
            dbRange.load("values");
            await context.sync();
            let headerFound = false;
            for (let i = 0; i < dbRange.values.length; i++) {
              const code = String(dbRange.values[i][0] || "").trim();
              const nom = String(dbRange.values[i][1] || "").trim();
              if (code === "Code") { headerFound = true; continue; }
              if (code === "TOTAL") break;
              if (headerFound && code) projectNames[code] = nom;
            }
          }

          allSheets = [];
          const templates = ["_TPL_FACTURABLE", "_TPL_INTERNE", "_TPL_CONSULTANT", "_TEMPLATE"];
          const specials = ["Ressources", "Planification LT équipe", "Tableau de bord"];

          for (const s of sheets.items) {
            let type = "special";
            let categorie = "";
            let nom = "";
            if (templates.includes(s.name)) {
              type = "template";
            } else if (specials.includes(s.name)) {
              type = "special";
            } else {
              type = "projet";
              nom = projectNames[s.name] || "";
              const tc = (s.tabColor || "").toLowerCase();
              if (tc.includes("077c79")) categorie = "Facturable";
              else if (tc.includes("eb5e63")) categorie = "Non-facturable";
              else if (tc.includes("eedb4c")) categorie = "Consultant municipal";
              else categorie = "Facturable";
            }
            allSheets.push({ name: s.name, type, categorie, nom, visible: s.visibility === "Visible" });
          }
          renderList();
        });
      } catch(e) {
        document.getElementById('projectList').innerHTML = '<div class="error">Erreur: ' + e.message + '</div>';
      }
    }

    function renderList() {
      const list = document.getElementById('projectList');
      const search = document.getElementById('searchInput').value.toLowerCase();
      const showTemplates = document.getElementById('chkTemplates').checked;

      const colorMap = {
        "Facturable": "#077C79",
        "Non-facturable": "#EB5E63",
        "Consultant municipal": "#EEDB4C"
      };

      let filtered = allSheets.filter(s => {
        if (s.type === "special") return false;
        if (s.type === "template" && !showTemplates) return false;
        if (navFilter !== "all" && s.type === "projet" && s.categorie !== navFilter) return false;
        if (search && !s.name.toLowerCase().includes(search) && !(s.nom || "").toLowerCase().includes(search)) return false;
        return true;
      });

      document.getElementById('projectCount').textContent = `${filtered.length} onglet(s)`;

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">Aucun onglet trouvé</div>';
        return;
      }

      list.innerHTML = '';
      for (const s of filtered) {
        const item = document.createElement('div');
        item.className = 'nav-item';

        if (s.type === 'projet') {
          const color = colorMap[s.categorie] || '#888';
          item.innerHTML = `<span class="nav-item-code" style="background:${color}">${s.name}</span><span class="nav-item-nom">${s.nom || s.name}</span>`;
        } else {
          item.innerHTML = `<span class="nav-item-special">⚙️ ${s.name}</span>`;
        }

        item.addEventListener('click', () => navigateToSheet(s.name));
        list.appendChild(item);
      }
    }

    async function navigateToSheet(sheetName) {
      try {
        await Excel.run(async (context) => {
          const ws = context.workbook.worksheets.getItem(sheetName);
          ws.activate();
          await context.sync();
        });
      } catch(e) {
        alert('Onglet "' + sheetName + '" introuvable');
      }
    }
  </script>
</body>
</html>
